slug: perf-optimization
created: 2026-06-26
pattern: performance

goal: >
  Cut the `/api/search` endpoint p95 latency below 200 ms under the standard
  load profile, with no correctness regression in the integration suite.

state:
  path: loops/perf-optimization/state.md
  records:
    - measured p95 and the optimization attempted
    - correctness verifier result
    - profiler hotspot or config change tried
    - next hypothesis

verifier:
  kind: benchmark
  command: "bash examples/perf-optimization/verify.sh"
  green_means: "p95 <= 200 ms on the standard profile AND the integration suite passes"

stop:
  success: "verifier GREEN (p95 at target and correctness suite green)"
  max_iterations: 5
  budget:
    tokens: null
    wall_clock_minutes: 30
  halt_file: loops/perf-optimization/HALT

autonomy: full
human_checkpoints:
  - "do not push or merge — perf changes land on the branch for human review only"
  - "do not disable correctness tests or lower load to fake a green benchmark"

integrations:
  oh_my_claudecode: true
  subagent_isolation: false
  heavy_orchestrator: false
