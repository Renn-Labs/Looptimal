name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

# One CI run per change: feature-branch pushes are covered by the pull_request event
# (this repo requires PRs), and rapid re-pushes to a PR cancel their superseded runs.
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (${{ matrix.os }} py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.10", "3.11", "3.12"]
        include:                       # cross-platform: the Python tools must run on macOS + Windows too
          - os: macos-latest
            python-version: "3.12"
          - os: windows-latest
            python-version: "3.12"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install pyyaml pytest
      - run: pytest -q

  runner-smoke:
    name: runner-smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]   # the bash runner: proves now_ms emits a numeric wall_ms on BSD/macOS date
    steps:
      - uses: actions/checkout@v4
      - name: one-iteration loop emits a numeric wall_ms
        shell: bash
        run: |
          L="$(mktemp -d)"
          cp templates/run-this-loop.sh "$L"/
          printf '#!/usr/bin/env bash\nset -euo pipefail\n[ -f done ]\n' > "$L/verify.sh"
          printf '#!/usr/bin/env bash\nset -euo pipefail\ntouch done\n' > "$L/maker.sh"
          ( cd "$L" && AUTONOMY=full bash run-this-loop.sh )
          python3 -c "import json; r=json.loads(open('$L/metrics.jsonl').readline()); w=r['wall_ms']; assert isinstance(w,int) and w>=0, ('bad wall_ms', w); print('OK wall_ms=', w)"

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ludeeus/action-shellcheck@master
        with:
          scandir: templates examples hooks
          severity: warning

  lint-specs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: pip install pyyaml
      - run: python3 scripts/loopprint-lint.py examples/*/loop-spec.yaml examples/campaign-*/campaign-spec.yaml examples/campaign-*/*/loop-spec.yaml

  version-consistency:
    name: version-consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # On every push/PR: plugin.json version must match the top CHANGELOG entry.
      # On a release (tag push): the tag must match that version too — blocks a phantom release.
      - name: version surfaces agree
        shell: bash
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            python3 scripts/check-version-consistency.py --tag "${{ github.ref_name }}"
          else
            python3 scripts/check-version-consistency.py
          fi

  docs-check:
    name: "docs-check (doc rot-radar: stale version pins + shipped-but-still-planned prose)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # Sibling to version-consistency above: that job guards plugin.json/CHANGELOG/tag
      # agreement; this one guards README.md/SECURITY.md prose against two specific ways it
      # went stale in this repo's own history (see CHANGELOG.md's [2.1.0] "### Fixed" section).
      - name: docs match shipped reality
        shell: bash
        run: python3 scripts/looptimal-docs-check.py

  no-network-imports:
    name: no-network-imports (zero-network-calls regression guard)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python3 scripts/check-no-network-imports.py

  skill-audit:
    name: skill-audit (independent third-party skill-security scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # NVIDIA/SkillSpector (Apache-2.0, github.com/NVIDIA/skillspector) — independently authored,
      # not affiliated with Renn Labs or Anthropic. --no-llm runs static analysis only, so this
      # needs no API key, account, or paid tier (the optional LLM-assisted stage is unused here).
      # No tagged release exists upstream yet; pinned to a commit SHA instead — bump deliberately.
      - run: pip install "git+https://github.com/NVIDIA/skillspector.git@326a2b489411a20ed742ff13701be39ba00063c8"
      # Scoped to scripts/*.py — the same surface no-network-imports.py guards (credential access,
      # outbound network calls, shell exec, supply-chain issues). .skillspector-baseline.yaml
      # records today's static-analysis-only findings, hand-reviewed as not real issues (see its
      # 'reason' fields and CONTRIBUTING.md) — only a genuinely new finding fails this job.
      - name: scan scripts/ and fail on any new (non-baselined) finding
        shell: bash
        run: |
          skillspector scan scripts --no-llm --baseline .skillspector-baseline.yaml --format json --output skillspector-report.json
          python3 -c "import json,sys; d=json.load(open('skillspector-report.json')); i=d.get('issues', []); [print(' ', x['severity'], x['id'], x['category'], x['location']) for x in i]; print(len(i), 'new finding(s) beyond .skillspector-baseline.yaml'); sys.exit(1 if i else 0)"
