name: CI

on:
  push:
    branches: [main]
  pull_request:

# One CI run per change: feature-branch pushes are covered by the pull_request event
# (this repo requires PRs), and rapid re-pushes to a PR cancel their superseded runs.
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install pyyaml pytest
      - run: pytest -q

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ludeeus/action-shellcheck@master
        with:
          scandir: templates examples
          severity: warning

  lint-specs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: pip install pyyaml
      - run: python3 scripts/loopprint-lint.py examples/ci-triage/loop-spec.yaml
