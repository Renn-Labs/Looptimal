# ILLUSTRATIVE example profile for OpenCode (sst/opencode).
#
# NOT maintained against OpenCode releases. Copy this to ~/.loopprint/profile.yaml (or a project's
# .loopprint/profile.yaml) and adjust the values to YOUR install. OpenCode natively discovers Agent
# Skills (SKILL.md) — from .opencode/skills/, ~/.config/opencode/skills/, and ~/.claude/skills/ — so
# Looptimal drops in unchanged; this profile only tunes how generated loops are wired. See
# ../references/profiles.md.

harness: opencode

# Where a loop's state + artifacts live in an OpenCode project.
state_dir: loops/<slug>

# OpenCode records no verifier verdict by default; if your setup writes one somewhere, point here.
marker_path: ""

verifier:
  # An independent reviewer (a separate OpenCode subagent) as the default gate (maker != checker),
  # or a real command.
  default: "an independent OpenCode subagent reviewer — or a test/build/lint/repro command"

dispatch:
  maker: "an OpenCode agent/command step"
  checker: "a SEPARATE OpenCode subagent (must differ from the maker)"

runner: run-this-loop.sh
banner: ""
