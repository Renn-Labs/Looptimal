# loop-spec.yaml — the four atoms + pattern + guardrails, machine-readable.
# Generated by LoopPrint. Edit by hand freely; run-this-loop.sh reads this file.
# Placeholders look like <ANGLE_BRACKETS> — every one must be filled before a run.

schema_version: 1                    # loop-spec schema version; loopprint-lint understands this
slug: <kebab-case-name>              # also the loops/<slug>/ directory name
created: <YYYY-MM-DD>
pattern: <morty | spec-driven | performance | hybrid>

# --- Atom 1: Goal -----------------------------------------------------------
goal: >
  <one sentence, testable; "done" must be checkable by a machine or a named reviewer>

# --- Atom 2: State ----------------------------------------------------------
state:
  path: loops/<slug>/state.md        # durable record; never reset until goal met
  records:                           # what each iteration appends
    - attempt summary
    - what failed / why
    - current hypothesis
    - relevant context

# --- Atom 3: Verifier (EXTERNAL — not the maker's own opinion) ---------------
verifier:
  kind: <test | build | lint | repro | benchmark | rubric | reviewer>
  command: "<exact shell command that exits 0 = GREEN, non-zero = RED>"
  # For a human/agent reviewer instead of a command:
  reviewer: "<name of the separate reviewer/agent — must differ from the maker>"
  green_means: "<what a pass actually proves>"

# --- Atom 4: Stop conditions (success AND a safety limit; first to hit wins) -
stop:
  success: "<objective condition that ends the loop, e.g. verifier GREEN + no regressions>"
  max_iterations: <int>              # hard safety cap
  budget:
    tokens: <int | null>
    wall_clock_minutes: <int | null>
  halt_file: loops/<slug>/HALT       # touch this file to stop the loop immediately

# --- Autonomy & safety ------------------------------------------------------
autonomy: <full | checkpoint | dry-run>   # full = run unattended; checkpoint = pause at gates
checkpoint_mode: before              # before = authorize each iteration; after = review each GREEN result
human_checkpoints:                   # irreversible / high-stakes steps that require a human
  - "<step that must never run autonomously, or [] if none>"

# --- Observability (optional; the runner emits these append-only files) ------
metrics:
  path: loops/<slug>/metrics.jsonl       # per-iteration {iter,wall_ms,verifier_result,accepted,tokens,cost} -> loopprint-report.py
  state_jsonl: loops/<slug>/state.jsonl  # append-only machine checkpoint (state.md stays the human-readable view)

# --- Optional integrations (delete if unused) -------------------------------
integrations:
  oh_my_claudecode: false            # use /loop + /goal as the driver
  subagent_isolation: false          # maker/checker separation via isolated sub-agent dispatch
  heavy_orchestrator: false          # heavy L0/L1/L2 orchestration, e.g. glueRun-go (see gluerun-snippet.yaml)
